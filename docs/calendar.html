<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalyst Calendar · Project Watchlist</title>
  <meta name="description" content="Column catalyst calendar for tracked Project Watchlist projects." />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2307080a'/%3E%3Cpath d='M5 17h6l3-7 4 13 3-6h6' fill='none' stroke='%23c8ff4d' stroke-width='2.4' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css?v=20260623-catalyst-muted-1" />
</head>
<body class="calendar-compact-body">
  <header class="calendar-compact-header">
    <div class="calendar-title-row">
      <a class="calendar-back-button" href="index.html">← Dashboard</a>
      <p class="eyebrow">Hermes Research · Watchlist</p>
      <h1>Catalyst Calendar</h1>
    </div>
    <input id="calSearch" type="search" placeholder="Search project or catalyst…" />
  </header>

  <main class="simple-calendar catalyst-board-page" aria-live="polite">
    <section id="catalystBoard" class="catalyst-board" aria-label="Catalyst columns">
      <article class="catalyst-lane" data-lane="happened">
        <header><span>Alr happened</span><strong id="lane-happened-count">—</strong></header>
        <div class="catalyst-lane-list" id="lane-happened"></div>
      </article>
      <article class="catalyst-lane" data-lane="week">
        <header><span>This week</span><strong id="lane-week-count">—</strong></header>
        <div class="catalyst-lane-list" id="lane-week"></div>
      </article>
      <article class="catalyst-lane" data-lane="month">
        <header><span>This month</span><strong id="lane-month-count">—</strong></header>
        <div class="catalyst-lane-list" id="lane-month"></div>
      </article>
      <article class="catalyst-lane" data-lane="later">
        <header><span>Unconfirmed / later</span><strong id="lane-later-count">—</strong></header>
        <div class="catalyst-lane-list" id="lane-later"></div>
      </article>
    </section>
  </main>

  <script src="calendar.js?v=20260623-all-catalysts-2"></script>
</body>
</html>
